<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Favorite Person 🎀</title>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-cream: #FFFDF5;
            --pastel-pink: #FFD1DC;
            --pastel-green: #90C6A9;
            --pastel-red: #EFA8A8;
            --text-red: #B54F4F;
            --note-yellow: #FFF9C4;
            --note-blue: #C1E1C1;
            --note-pink: #F8BBD0;
        }

        body {
            background-color: var(--bg-cream);
            font-family: 'Gaegu', cursive;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            color: #555;
            font-size: 1.2rem;
            overflow-x: hidden;
        }

        .container { text-align: center; width: 95%; max-width: 900px; padding: 40px 10px; position: relative; }
        .hidden { display: none !important; }

        /* --- SCREEN 1: THE GAME --- */
        .sticker { width: 220px; height: 220px; object-fit: contain; margin-bottom: 20px; border-radius: 20px; }
        .btn-container { display: flex; justify-content: center; align-items: center; gap: 20px; min-height: 350px; position: relative; }
        button.main-btn { border: none; border-radius: 15px; cursor: pointer; font-family: 'Gaegu', cursive; font-weight: bold; font-size: 1.5rem; transition: transform 0.2s; }
        
        #yesBtn { background-color: var(--pastel-green); color: white; padding: 15px 40px; z-index: 10; position: relative; }
        #noBtn { background-color: var(--pastel-red); color: white; padding: 10px 25px; font-size: 1.1rem; position: absolute; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 5; }

        /* --- SCREEN 2: GIFT MENU --- */
        .gift-grid { display: flex; justify-content: center; gap: 20px; margin-top: 30px; flex-wrap: wrap; }
        .gift-box { background: #fff; border: 3px solid var(--pastel-pink); border-radius: 25px; padding: 20px; width: 140px; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(255, 209, 220, 0.3); }
        .gift-box:hover { transform: translateY(-10px); }
        .gift-box img { width: 100px; height: 100px; object-fit: cover; border-radius: 15px; margin-bottom: 10px; }
        .gift-box p { margin: 0; font-weight: bold; color: var(--text-red); }

        /* --- PAGE 1: AESTHETIC MEMORY GRID --- */
        .photo-strip {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 40px;
            padding: 40px 20px;
            perspective: 1000px;
        }
        .polaroid { 
            background: white; 
            padding: 12px 12px 35px 12px; 
            box-shadow: 0 8px 15px rgba(0,0,0,0.1); 
            transition: 0.3s ease;
            cursor: pointer;
        }
        .polaroid:nth-child(odd) { transform: rotate(-3deg); }
        .polaroid:nth-child(even) { transform: rotate(4deg); }
        .polaroid:hover { transform: scale(1.05) rotate(0deg) !important; z-index: 10; }
        
        .polaroid img { width: 100%; height: 200px; object-fit: cover; pointer-events: none; }
        .polaroid p { margin: 10px 0 0 0; font-size: 1.1rem; color: #777; }

        .partner-wrapper { grid-column: 1 / -1; display: flex; justify-content: center; gap: 10px; padding: 20px 0; }
        .partner-left { transform: rotate(-8deg) !important; margin-right: -30px; z-index: 2; }
        .partner-right { transform: rotate(6deg) !important; margin-left: -30px; z-index: 1; }

        /* --- PAGE 2: MUSIC BOX --- */
        #page2 { width: 100%; display: flex; flex-direction: column; align-items: center; }
        .music-layout { display: flex; gap: 25px; width: 100%; max-width: 800px; margin: 20px auto; align-items: flex-start; flex-wrap: wrap; justify-content: center; }
        .vinyl-box { background-color: var(--pastel-pink); border-radius: 20px; padding: 30px; display: flex; align-items: center; justify-content: center; width: 250px; height: 250px; box-shadow: 0 8px 15px rgba(255, 209, 220, 0.4); }
        .vinyl { width: 190px; height: 190px; background-color: #333; border-radius: 50%; border: 10px solid #222; display: flex; align-items: center; justify-content: center; animation: spin 6s linear infinite; animation-play-state: paused; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .vinyl-inner { width: 60px; height: 60px; background-color: var(--pastel-pink); border-radius: 50%; border: 3px solid #fff; }
        
        .video-controls-area { flex: 1; min-width: 320px; max-width: 480px; display: flex; flex-direction: column; gap: 15px; }
        .video-box { background-color: white; border-radius: 20px; padding: 20px; aspect-ratio: 16 / 9; box-shadow: 0 8px 15px rgba(0,0,0,0.05); overflow: hidden; }
        #myVideo { width: 100%; border-radius: 10px; }
        
        .controls-box { background-color: var(--pastel-pink); border-radius: 15px; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        .play-pause-btn { background-color: white; color: var(--text-red); width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .duration-line { flex: 1; height: 4px; background-color: white; margin: 0 15px; border-radius: 2px; position: relative; }
        .duration-progress { width: 0%; height: 100%; background-color: var(--text-red); position: absolute; }

        /* --- PAGE 3: STICKY WALL --- */
        .note-controls { background: white; padding: 20px; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        textarea { width: 90%; height: 80px; border: 2px solid var(--pastel-pink); border-radius: 10px; font-family: 'Gaegu'; padding: 10px; margin-bottom: 10px; font-size: 1.1rem; }
        .color-selection { display: flex; justify-content: center; gap: 15px; margin-bottom: 15px; }
        .color-btn { width: 40px; height: 40px; border-radius: 50%; border: 4px solid white; cursor: pointer; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .color-btn.active { border-color: var(--text-red); transform: scale(1.1); }
        
        .wall-container { background: #f0f0f0; border: 8px solid #ddd; border-radius: 15px; min-height: 400px; padding: 20px; display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; }
        .sticky-note { width: 140px; height: 140px; padding: 15px; box-shadow: 5px 5px 10px rgba(0,0,0,0.1); transform: rotate(-2deg); font-size: 1rem; text-align: left; overflow-y: auto; }

        .go-back-btn { margin-top: 30px; background: var(--pastel-pink); padding: 12px 40px; color: white; border-radius: 15px; cursor: pointer; border: none; font-family: 'Gaegu'; font-size: 1.2rem; }
    </style>
</head>
<body onload="initApp()">

<div class="container">
    <div id="screen1">
        <img id="mainSticker" src="49f79c18d52d885b3eca73c28ad3c11a.gif" class="sticker">
        <h1 id="mainTitle" style="color: var(--text-red); font-size: 2.5rem;">Do you love me? 🎀</h1>
        <div class="btn-container" id="gameArea">
            <button id="yesBtn" class="main-btn" onclick="showGifts()">Yes</button>
            <button id="noBtn" class="main-btn" onmouseover="handleNo()" onclick="handleNo()">No</button>
        </div>
    </div>

    <div id="screen2" class="hidden">
        <h1 style="color: var(--text-red); font-size: 2.5rem;">I knew you'd say yes hehe💞</h1>
        <img src="d53afd2ceb92715179699f7dc710238b.gif" class="sticker">
        <div class="gift-grid">
            <div class="gift-box" onclick="showPage('page1')"><img src="7c9fd6209761907494bd3d618fe98d24.jpg"><p>MEMORIES</p></div>
            <div class="gift-box" onclick="showPage('page2')"><img src="7c9fd6209761907494bd3d618fe98d24.jpg"><p>OUR SONG</p></div>
            <div class="gift-box" onclick="showPage('page3')"><img src="7c9fd6209761907494bd3d618fe98d24.jpg"><p>OUR WALL</p></div>
        </div>
    </div>

    <div id="page1" class="hidden">
        <h1 style="color: var(--text-red); font-size: 2.5rem;">Captured Memories</h1>
        <div class="photo-strip">
            <div class="polaroid"><img src="20260217015836_1.jpg"><p>love you</p></div>
            <div class="polaroid"><img src="20260328095546_1.jpg"><p>sweetly</p></div>
            <div class="polaroid"><img src="20260328100013_1.jpg"><p>always</p></div>
            <div class="polaroid"><img src="20260328101557_1.jpg"><p>captured</p></div>
            <div class="polaroid"><img src="20260228215635_1.jpg"><p>us</p></div>
            <div class="polaroid"><img src="SKY_20260403_092922.jpg"><p>skies</p></div>
            <div class="partner-wrapper">
                <div class="polaroid partner-left"><img src="2325290_1925.jpg"><p>you &</p></div>
                <div class="polaroid partner-right"><img src="SKY_20260403_085117.jpg"><p>me</p></div>
            </div>
            <div class="polaroid"><img src="SKY_20260226_201203.jpg"><p>starlight</p></div>
            <div class="polaroid"><img src="20260304134815_1.jpg"><p>forever</p></div>
            <div class="polaroid"><img src="SKY_20260323_224725.jpg"><p>our world</p></div>
            <div class="polaroid"><img src="SKY_20260324_081529.jpg"><p>mine</p></div>
        </div>
        <button class="go-back-btn" onclick="showGifts()">Go back</button>
    </div>

    <div id="page2" class="hidden">
        <h1 style="color: var(--text-red); margin-bottom: 20px;">A song that reminds me of us</h1>
        <div class="music-layout">
            <div class="vinyl-box">
                <div class="vinyl" id="vinylDisk"><div class="vinyl-inner"></div></div>
            </div>
            <div class="video-controls-area">
                <div class="video-box">
                    <video id="myVideo"><source src="glue.mp4" type="video/mp4"></video>
                </div>
                <div class="controls-box">
                    <div class="play-pause-btn" onclick="togglePlay()" id="playBtn">▶</div>
                    <div class="duration-line"><div class="duration-progress" id="progress"></div></div>
                    <div id="timeText" style="font-size: 0.8rem; color: #fff;">00:00 / 00:00</div>
                </div>
            </div>
        </div>
        <button class="go-back-btn" onclick="showGifts()">Go back</button>
    </div>

    <div id="page3" class="hidden">
        <h1 style="color: var(--text-red);">Our Secret Wall ✍️</h1>
        <div class="note-controls">
            <textarea id="noteInput" placeholder="Write something cute..."></textarea>
            <div class="color-selection">
                <div class="color-btn active" style="background: var(--note-yellow);" onclick="setCol('#FFF9C4', this)"></div>
                <div class="color-btn" style="background: var(--note-blue);" onclick="setCol('#C1E1C1', this)"></div>
                <div class="color-btn" style="background: var(--note-pink);" onclick="setCol('#F8BBD0', this)"></div>
            </div>
            <button class="main-btn" style="background: var(--pastel-green); color:white; padding:10px 30px;" onclick="addNote()">Pin it!</button>
        </div>
        <div class="wall-container" id="wall"></div>
        <button class="go-back-btn" onclick="showGifts()">Go back</button>
    </div>
</div>

<script>
    let clicks = 0;
    let currCol = '#FFF9C4';
    const phrases = ["Wait... r u sure? qwq", "Nah that's not right...", "Try again please T-T", "Be serious.", "Okay now you're teasing me :vvv", "You're persistent! XD"];

    function initApp() { loadNotes(); }

    function handleNo() {
        const noBtn = document.getElementById('noBtn');
        const area = document.getElementById('gameArea');
        const sticker = document.getElementById('mainSticker');
        
        const maxX = area.clientWidth - noBtn.clientWidth;
        const maxY = area.clientHeight - noBtn.clientHeight;
        noBtn.style.left = Math.floor(Math.random() * maxX) + 'px';
        noBtn.style.top = Math.floor(Math.random() * maxY) + 'px';

        clicks++;
        
        if (clicks == 1) sticker.src = "cce75f6f511daac6665568c8ffd7ce9c.gif";
        else if (clicks == 3) sticker.src = "27174b57801a1e0335dc39438d15c6d0.gif";
        else if (clicks == 5) sticker.src = "659781f6460a12ea529eb0bf195f9cc9.gif";
        else if (clicks >= 6) sticker.src = "9c4f1f264e1135adc44512ff29d4bcf5.gif";

        if(clicks <= phrases.length) document.getElementById('mainTitle').innerText = phrases[clicks-1];
        document.getElementById('yesBtn').style.transform = `scale(${1 + (clicks * 0.35)})`;
    }

    function setCol(c, el) {
        currCol = c;
        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    function addNote() {
        const txt = document.getElementById('noteInput');
        if (!txt.value.trim()) return;
        const noteObj = { text: txt.value, color: currCol };
        createNote(noteObj.text, noteObj.color);
        let saved = JSON.parse(localStorage.getItem('mems_v5')) || [];
        saved.push(noteObj);
        localStorage.setItem('mems_v5', JSON.stringify(saved));
        txt.value = "";
    }

    function createNote(text, color) {
        const note = document.createElement('div');
        note.className = 'sticky-note';
        note.style.background = color;
        note.innerText = text;
        document.getElementById('wall').appendChild(note);
    }

    function loadNotes() {
        let saved = JSON.parse(localStorage.getItem('mems_v5')) || [];
        saved.forEach(n => createNote(n.text, n.color));
    }

    const video = document.getElementById('myVideo');
    const playBtn = document.getElementById('playBtn');
    const vinyl = document.getElementById('vinylDisk');
    const progress = document.getElementById('progress');

    function togglePlay() {
        if (video.paused) { video.play(); playBtn.innerText = "⏸"; vinyl.style.animationPlayState = "running"; }
        else { video.pause(); playBtn.innerText = "▶"; vinyl.style.animationPlayState = "paused"; }
    }

    video.ontimeupdate = function() {
        const perc = (video.currentTime / video.duration) * 100;
        progress.style.width = perc + "%";
        let curM = Math.floor(video.currentTime / 60);
        let curS = Math.floor(video.currentTime % 60);
        let durM = Math.floor(video.duration / 60) || 0;
        let durS = Math.floor(video.duration % 60) || 0;
        document.getElementById('timeText').innerText = `${curM}:${curS.toString().padStart(2,'0')} / ${durM}:${durS.toString().padStart(2,'0')}`;
    };

    function showGifts() {
        document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden'));
        document.getElementById('screen2').classList.remove('hidden');
    }

    function showPage(id) {
        document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        window.scrollTo(0,0);
    }
</script>
</body>
</html>
