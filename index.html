<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Favorite Person 🎀</title>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-cream: #FFFDF5;
            --pastel-pink: #FFD1DC;
            --pastel-green: #90C6A9;
            --pastel-red: #EFA8A8;
            --text-red: #B54F4F;
            --note-yellow: #FFF9C4;
            --note-blue: #C1E1C1;
            --note-pink: #F8BBD0;
        }

        body {
            background-color: var(--bg-cream);
            font-family: 'Gaegu', cursive;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            color: #555;
            font-size: 1.2rem;
            overflow-x: hidden;
        }

        .container { text-align: center; width: 95%; max-width: 900px; padding: 40px 10px; position: relative; }
        .hidden { display: none !important; }

        /* --- SCREEN 1: THE GAME --- */
        .sticker { width: 220px; height: 220px; object-fit: contain; margin-bottom: 20px; border-radius: 20px; }
        .btn-container { display: flex; justify-content: center; align-items: center; gap: 20px; min-height: 400px; position: relative; }
        button.main-btn { border: none; border-radius: 15px; cursor: pointer; font-family: 'Gaegu', cursive; font-weight: bold; font-size: 1.5rem; transition: transform 0.2s; }
        #yesBtn { background-color: var(--pastel-green); color: white; padding: 15px 40px; z-index: 10; position: relative; }
        #noBtn { background-color: var(--pastel-red); color: white; padding: 15px 40px; position: absolute; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 5; }

        /* --- SCREEN 2: GIFT MENU --- */
        .gift-grid { display: flex; justify-content: center; gap: 20px; margin-top: 30px; flex-wrap: wrap; }
        .gift-box { background: #fff; border: 3px solid var(--pastel-pink); border-radius: 25px; padding: 20px; width: 140px; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(255, 209, 220, 0.3); }
        .gift-box:hover { transform: translateY(-10px); }
        .gift-box img { width: 100px; margin-bottom: 10px; }
        .gift-box p { margin: 0; font-weight: bold; color: var(--text-red); }

        /* --- PAGE 1: MEMORIES --- */
        .upload-section { margin-bottom: 20px; background: white; padding: 15px; border-radius: 20px; display: inline-block; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .photo-strip { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 30px; padding: 20px 10px; }
        .polaroid { background: white; padding: 12px 12px 40px 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); position: relative; }
        .polaroid img { width: 100%; height: 200px; object-fit: cover; }
        .partner-wrapper { grid-column: 1 / -1; display: flex; justify-content: center; gap: 15px; padding: 20px 0; }
        .partner-left { transform: rotate(-5deg) !important; margin-right: -25px; z-index: 2; }
        .partner-right { transform: rotate(4deg) !important; margin-left: -25px; z-index: 1; }

        /* --- PAGE 2: MUSIC BOX (GLUE.MP4) --- */
        .music-layout { display: flex; gap: 25px; width: 100%; max-width: 800px; margin: 20px auto; align-items: flex-start; flex-wrap: wrap; justify-content: center; }
        .vinyl-box { background-color: var(--pastel-pink); border-radius: 20px; padding: 30px; display: flex; align-items: center; justify-content: center; width: 250px; height: 250px; box-sizing: border-box; }
        .vinyl { width: 190px; height: 190px; background-color: #333; border-radius: 50%; border: 10px solid #222; display: flex; align-items: center; justify-content: center; animation: spin 6s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .vinyl-inner { width: 60px; height: 60px; background-color: var(--pastel-pink); border-radius: 50%; border: 3px solid #fff; }
        .video-box { background-color: white; border-radius: 20px; padding: 10px; width: 100%; max-width: 450px; box-shadow: 0 8px 15px rgba(0,0,0,0.05); }
        video { width: 100%; border-radius: 15px; }

        /* --- PAGE 3: STICKY WALL --- */
        .wall-container { background: #f0f0f0; border: 8px solid #ddd; border-radius: 15px; min-height: 400px; padding: 20px; display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; margin: 20px 0; }
        .sticky-note { width: 140px; height: 140px; padding: 15px; box-shadow: 5px 5px 10px rgba(0,0,0,0.1); transform: rotate(-2deg); font-size: 1rem; text-align: left; word-wrap: break-word; overflow-y: auto; }
        
        .go-back-btn { margin-top: 30px; background: var(--pastel-pink); padding: 10px 40px; color: white; border-radius: 15px; cursor: pointer; border: none; font-family: 'Gaegu'; }
    </style>
</head>
<body>

<div class="container">
    <div id="screen1">
        <img id="mainSticker" src="49f79c18d52d885b3eca73c28ad3c11a.gif" class="sticker">
        <h1 id="mainTitle" style="color: var(--text-red); font-size: 2.5rem;">Do you love me? 🎀</h1>
        <div class="btn-container" id="gameArea">
            <button id="yesBtn" class="main-btn" onclick="showGifts()">Yes</button>
            <button id="noBtn" class="main-btn" onmouseover="moveNoButton()" onclick="handleNo()">No</button>
        </div>
    </div>

    <div id="screen2" class="hidden">
        <h1 style="color: var(--text-red); font-size: 2.5rem;">I knew you'd say yes hehe💞</h1>
        <img src="d53afd2ceb92715179699f7dc710238b.gif" class="sticker">
        <div class="gift-grid">
            <div class="gift-box" onclick="showPage('page1')"><img src="7c9fd6209761907494bd3d618fe98d24.png"><p>MEMORIES</p></div>
            <div class="gift-box" onclick="showPage('page2')"><img src="7c9fd6209761907494bd3d618fe98d24.png"><p>OUR SONG</p></div>
            <div class="gift-box" onclick="showPage('page3')"><img src="7c9fd6209761907494bd3d618fe98d24.png"><p>OUR WALL</p></div>
        </div>
    </div>

    <div id="page1" class="hidden">
        <h1 style="color: var(--text-red); font-size: 2.5rem;">Captured Memories</h1>
        
        <div class="upload-section">
            <p style="margin: 0 0 10px 0; font-size: 1rem;">Add a new memory:</p>
            <input type="file" id="photoUpload" accept="image/*" style="font-family: 'Gaegu';">
            <button class="main-btn" style="font-size: 1rem; background: var(--pastel-green); color: white; padding: 5px 15px;" onclick="handleUpload()">Upload</button>
        </div>

        <div class="photo-strip" id="memoryGrid">
            <div class="polaroid"><img src="20260217015836_1.jpg"><p>love you</p></div>
            <div class="polaroid"><img src="20260328095546_1.jpg"><p>sweetly</p></div>
            <div class="partner-wrapper">
                <div class="polaroid partner-left"><img src="2325290_1925.jpg"><p>you &</p></div>
                <div class="polaroid partner-right"><img src="SKY_20260403_085117.jpg"><p>me</p></div>
            </div>
            <div class="polaroid"><img src="SKY_20260226_201203.jpg"><p>starlight</p></div>
            </div>
        <button class="go-back-btn" onclick="showGifts()">Go back</button>
    </div>

    <div id="page2" class="hidden">
        <h1 style="color: var(--text-red); margin-bottom: 20px;">A song that reminds me of us</h1>
        <div class="music-layout">
            <div class="vinyl-box">
                <div class="vinyl"><div class="vinyl-inner"></div></div>
            </div>
            <div class="video-box">
                <video controls>
                    <source src="glue.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
        </div>
        <button class="go-back-btn" onclick="showGifts()">Go back</button>
    </div>

    <div id="page3" class="hidden">
        <h1 style="color: var(--text-red);">Our Secret Wall ✍️</h1>
        <div style="background: white; padding: 20px; border-radius: 20px; margin-bottom: 20px;">
            <textarea id="noteInput" placeholder="Write something cute..." style="width: 80%; height: 50px; font-family: 'Gaegu'; padding: 10px;"></textarea><br>
            <button class="main-btn" style="background: var(--pastel-green); color:white; padding:5px 15px; font-size:1.1rem; margin-top:10px;" onclick="addNote()">Pin it!</button>
        </div>
        <div class="wall-container" id="wall">
            <div class="sticky-note" style="background: var(--note-pink);">Leave me a note! 🎀</div>
        </div>
        <button class="go-back-btn" onclick="showGifts()">Go back</button>
    </div>
</div>

<script>
    let clicks = 0;
    const phrases = ["Wait... are you sure? qwq", "Nah that's not right...", "Try again please T-T", "Be serious.", "Okay now you're teasing me :vvv", "You're persistent! XD"];

    function handleUpload() {
        const fileInput = document.getElementById('photoUpload');
        const grid = document.getElementById('memoryGrid');
        
        if (fileInput.files && fileInput.files) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const newPolaroid = document.createElement('div');
                newPolaroid.className = 'polaroid';
                newPolaroid.style.transform = `rotate(${Math.random() * 6 - 3}deg)`;
                newPolaroid.innerHTML = `<img src="${e.target.result}"><p>new memory</p>`;
                grid.appendChild(newPolaroid);
            }
            reader.readAsDataURL(fileInput.files);
        }
    }

    function addNote() {
        const txt = document.getElementById('noteInput');
        if (!txt.value.trim()) return;
        const note = document.createElement('div');
        note.className = 'sticky-note';
        note.style.background = '#FFF9C4';
        note.innerText = txt.value;
        document.getElementById('wall').appendChild(note);
        txt.value = "";
    }

    function moveNoButton() {
        const noBtn = document.getElementById('noBtn');
        const area = document.getElementById('gameArea');
        const yesBtn = document.getElementById('yesBtn');
        const areaRect = area.getBoundingClientRect();
        const yesRect = yesBtn.getBoundingClientRect();

        let x, y, overlap = true;
        while(overlap) {
            x = Math.random() * (areaRect.width - 100);
            y = Math.random() * (areaRect.height - 50);
            const xO = x < (yesRect.left - areaRect.left) + yesRect.width + 40 && x + 100 > (yesRect.left - areaRect.left) - 40;
            const yO = y < (yesRect.top - areaRect.top) + yesRect.height + 40 && y + 50 > (yesRect.top - areaRect.top) - 40;
            if (!xO || !yO) overlap = false;
        }
        noBtn.style.left = x + 'px';
        noBtn.style.top = y + 'px';
    }

    function handleNo() {
        clicks++;
        const sticker = document.getElementById('mainSticker');
        if (clicks == 1) sticker.src = "cce75f6f511daac6665568c8ffd7ce9c.gif";
        else if (clicks == 3) sticker.src = "27174b57801a1e0335dc39438d15c6d0.gif";
        else if (clicks == 5) sticker.src = "659781f6460a12ea529eb0bf195f9cc9.gif";
        else if (clicks >= 6) sticker.src = "9c4f1f264e1135adc44512ff29d4bcf5.gif";

        document.getElementById('mainTitle').innerText = phrases[Math.min(clicks-1, 5)];
        document.getElementById('yesBtn').style.transform = `scale(${1 + clicks * 0.4})`;
        moveNoButton();
    }

    function showGifts() {
        document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden'));
        document.getElementById('screen2').classList.remove('hidden');
        document.body.style.overflow = "auto";
    }

    function showPage(id) {
        document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        window.scrollTo(0,0);
    }
</script>
</body>
                                                                                                                                                                               </html>
